<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verify Certificate · ArtCOA</title>
<link rel="icon" type="image/jpeg" href="icon.jpg">
<link rel="apple-touch-icon" href="icon.jpg">
<meta property="og:title" content="Verify Certificate · ArtCOA">
<meta property="og:description" content="Verify the authenticity of an artwork certificate.">
<meta property="og:image" content="https://wizartclub-cyber.github.io/artCOA/icon.jpg">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://wizartclub-cyber.github.io/artCOA/icon.jpg">
<style>
  :root{
    --ink:#1a1714;--paper:#fbfaf7;--stone:#6b645b;--line:#d8d3c9;
    --seal:#7c2d2d;--ok:#2f5d3a;--warn:#8a5a1c;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Helvetica Neue',Arial,sans-serif;background:var(--paper);
       color:#111;line-height:1.5;min-height:100vh}
  .wrap{max-width:640px;margin:0 auto;padding:28px 18px 70px}

  .top{display:flex;align-items:center;justify-content:center;gap:14px;
       padding-bottom:20px;border-bottom:1px solid var(--line);margin-bottom:26px}
  .top img{height:46px;border-radius:6px;display:block}
  .mark{font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--seal)}
  .top h1{font-size:18px;font-weight:600;letter-spacing:.01em}

  .status{display:flex;align-items:center;gap:14px;padding:18px 20px;
          border:1px solid var(--line);margin-bottom:24px;background:#fff}
  .status .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
  .status .txt b{display:block;font-size:15px}
  .status .txt span{font-size:12.5px;color:var(--stone)}
  .status.valid .dot{background:var(--ok)}
  .status.valid{border-left:3px solid var(--ok)}
  .status.unsigned .dot{background:var(--warn)}
  .status.unsigned{border-left:3px solid var(--warn)}
  .status.invalid .dot{background:var(--seal)}
  .status.invalid{border-left:3px solid var(--seal)}

  /* certificate-matching card (mirrors the generated PDF look) */
  .card{background:#fff;border:1px solid #111;padding:34px 30px;position:relative}
  .card::before{content:"";position:absolute;inset:6px;border:1px solid #111;pointer-events:none}
  .ci{position:relative;z-index:1}
  .c-title{text-align:center;font-size:17px;font-weight:700;letter-spacing:.01em;line-height:1.35}
  .c-id{text-align:center;font-size:12.5px;color:#333;margin-top:8px;
        font-family:'Courier New',monospace}
  .rule{height:1px;background:var(--line);margin:20px 0}
  .row{display:flex;justify-content:space-between;gap:14px;padding:7px 0;font-size:14px;
       align-items:baseline;flex-wrap:wrap}
  .row .k{font-weight:700;color:#111;flex:1;min-width:150px}
  .row .v{text-align:right}
  .disc{font-size:10.5px;color:var(--stone);text-align:center;line-height:1.6;
        margin-top:20px;padding-top:14px;border-top:1px solid var(--line)}
  .empty{text-align:center;color:var(--stone);padding:60px 20px;font-size:15px}
  .verify-key{margin-top:24px;padding:16px 18px;background:#f3f1ec;border-left:3px solid var(--seal)}
  .verify-key label{display:block;font-size:11px;letter-spacing:.08em;
        text-transform:uppercase;color:var(--stone);margin-bottom:8px;font-weight:600}
  .verify-key input{width:100%;font-family:'Helvetica Neue',Arial,sans-serif;font-size:15px;
        padding:10px 12px;border:1px solid var(--line);background:#fff}
  .verify-key p{font-size:11.5px;color:var(--stone);margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <a href="https://smalta.gallery/" target="_blank" rel="noopener"><img src="smalta-logo.jpg" alt="Smalta Art Gallery"></a>
    <div>
      <div class="mark">◇ ArtCOA</div>
      <h1 id="h-title">Certificate Verification</h1>
    </div>
  </div>
  <div id="root"></div>
</div>

<script>
const T = {
  en:{verifying:"Verifying…",
    valid:"Authentic — signature verified", validSub:"Signature matches the issuing artist's key.",
    unsigned:"Certificate readable — signature not checked", unsignedSub:"Enter the artist's key below to confirm the signature.",
    invalid:"Signature does not match", invalidSub:"This certificate may have been altered or the key is wrong.",
    nodata:"No certificate data found in this link.",
    eyebrow:"Certificate of Authenticity", title:"Title of artwork",
    artist:"Artist",year:"Year",technique:"Technique",support:"Support",
    sheet:"Sheet size",area:"Artwork area",status:"Status Edition",
    editionId:"Edition ID",editionNo:"Edition number",gallery:"Gallery",
    issued:"Date issued",serial:"Serial",
    keylabel:"Artist signature key",
    keyhint:"Only the issuing artist knows this. Enter it to confirm the certificate is genuine and unaltered.",
    disc:"This Certificate of Authenticity confirms the authorship and identification of the artwork based on information provided by the artist or authorised representative. It does not automatically transfer copyright or ownership rights unless explicitly stated in a separate agreement."
  },
  uk:{verifying:"Перевірка…",
    valid:"Автентичний — підпис підтверджено", validSub:"Підпис відповідає ключу художника-емітента.",
    unsigned:"Сертифікат читається — підпис не перевірено", unsignedSub:"Введіть ключ художника нижче, щоб підтвердити підпис.",
    invalid:"Підпис не співпадає", invalidSub:"Сертифікат міг бути змінений або введено невірний ключ.",
    nodata:"У цьому посиланні немає даних сертифіката.",
    eyebrow:"Сертифікат автентичності", title:"Назва твору",
    artist:"Художник",year:"Рік",technique:"Техніка",support:"Основа",
    sheet:"Розмір аркуша",area:"Розмір зображення",status:"Статус видання",
    editionId:"ID видання",editionNo:"Номер у тиражі",gallery:"Галерея",
    issued:"Дата видачі",serial:"Номер",
    keylabel:"Ключ підпису художника",
    keyhint:"Цей ключ знає лише художник-емітент. Введіть його, щоб підтвердити справжність сертифіката.",
    disc:"Цей сертифікат автентичності підтверджує авторство та ідентифікацію твору на підставі інформації, наданої художником або уповноваженим представником. Сертифікат не передає автоматично авторські права або право власності, якщо це прямо не передбачено окремим договором."
  },
  sk:{verifying:"Overovanie…",
    valid:"Pravé — podpis overený", validSub:"Podpis sa zhoduje s kľúčom vydávajúceho umelca.",
    unsigned:"Certifikát čitateľný — podpis neoverený", unsignedSub:"Zadajte kľúč umelca nižšie na potvrdenie podpisu.",
    invalid:"Podpis sa nezhoduje", invalidSub:"Tento certifikát mohol byť zmenený alebo je kľúč nesprávny.",
    nodata:"V tomto odkaze nie sú údaje certifikátu.",
    eyebrow:"Certifikát pravosti", title:"Názov diela",
    artist:"Umelec",year:"Rok",technique:"Technika",support:"Podklad",
    sheet:"Rozmer listu",area:"Plocha diela",status:"Stav edície",
    editionId:"ID edície",editionNo:"Číslo edície",gallery:"Galéria",
    issued:"Dátum vydania",serial:"Číslo",
    keylabel:"Podpisový kľúč umelca",
    keyhint:"Pozná ho len vydávajúci umelec. Zadajte ho na potvrdenie, že certifikát je pravý a nezmenený.",
    disc:"Tento certifikát pravosti potvrdzuje autorstvo a identifikáciu diela na základe informácií poskytnutých umelcom alebo oprávneným zástupcom. Automaticky neprevádza autorské práva ani vlastníctvo, pokiaľ to nie je výslovne uvedené v samostatnej dohode."
  }
};
// Bilingual field label: English only for EN, "<cert language> / English" for UK / SK
function vlab(key, lang){
  const en = T.en[key];
  if(lang==='en' || !T[lang]) return en;
  return T[lang][key] + ' / ' + en;
}

function decodeData(str){
  str = str.replace(/-/g,'+').replace(/_/g,'/');
  const bin = atob(str);
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i]=bin.charCodeAt(i);
  const json = new TextDecoder().decode(bytes);
  return JSON.parse(json);
}
function sigHash(str){
  let h=5381; for(let i=0;i<str.length;i++){h=((h<<5)+h)+str.charCodeAt(i);h=h>>>0;}
  return h.toString(16).padStart(8,'0');
}

function rowHTML(k,v){ return v ? `<div class="row"><span class="k">${k}</span><span class="v">${esc(v)}</span></div>` : ''; }
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

function checkSig(d, key){
  const stored = d.sg;
  const copy = {...d}; delete copy.sg;
  const calc = sigHash(JSON.stringify(copy)+'::'+key);
  return calc === stored;
}

function render(d, lang){
  const t = T[lang] || T.en;
  document.documentElement.lang = lang;

  let statusClass='unsigned', statusTitle=t.unsigned, statusSub=t.unsignedSub;
  // try with empty key first (cert generated without a secret)
  if(d.sg && checkSig(d,'')){ statusClass='valid'; statusTitle=t.valid; statusSub=t.validSub; }

  const keyBox = (statusClass!=='valid') ? `
    <div class="verify-key">
      <label>${t.keylabel}</label>
      <input id="keyin" placeholder="••••••" oninput="recheck()">
      <p>${t.keyhint}</p>
    </div>` : '';

  document.getElementById('root').innerHTML = `
    <div class="status ${statusClass}" id="statusbar">
      <span class="dot"></span>
      <span class="txt"><b id="st-title">${statusTitle}</b><span id="st-sub">${statusSub}</span></span>
    </div>
    <div class="card"><div class="ci">
      <div class="c-title">${vlab('eyebrow',lang)}</div>
      <div class="c-id">${esc(d.sn||'')}</div>
      <div class="rule"></div>
      ${rowHTML(vlab('artist',lang),d.ar)}
      ${rowHTML(vlab('title',lang),d.ti)}
      ${rowHTML(vlab('year',lang),d.yr)}
      ${rowHTML(vlab('technique',lang),d.te)}
      ${rowHTML(vlab('support',lang),d.su)}
      ${rowHTML(vlab('sheet',lang),d.ss)}
      ${rowHTML(vlab('area',lang),d.aa)}
      ${rowHTML(vlab('status',lang),d.se)}
      ${rowHTML(vlab('editionId',lang),d.ei)}
      ${rowHTML(vlab('editionNo',lang), d.en ? (d.en + (d.et ? ' / '+d.et : '')) : '')}
      ${rowHTML(vlab('gallery',lang),d.gl)}
      ${rowHTML(vlab('issued',lang),d.is)}
      <div class="rule"></div>
      <div class="disc">${t.disc}</div>
    </div></div>
    ${keyBox}`;

  window._cert = d; window._lang = lang;
}

function recheck(){
  const key = document.getElementById('keyin').value;
  const d = window._cert, t = T[window._lang]||T.en;
  const bar = document.getElementById('statusbar');
  const ok = checkSig(d,key);
  bar.className = 'status ' + (key==='' ? 'unsigned' : (ok?'valid':'invalid'));
  document.getElementById('st-title').textContent = key==='' ? t.unsigned : (ok?t.valid:t.invalid);
  document.getElementById('st-sub').textContent   = key==='' ? t.unsignedSub : (ok?t.validSub:t.invalidSub);
}

(function init(){
  const hash = location.hash.slice(1);
  if(!hash){
    document.getElementById('root').innerHTML =
      `<div class="empty">${T.en.nodata}<br><span style="font-size:12px">${T.uk.nodata}</span></div>`;
    return;
  }
  try{
    const d = decodeData(hash);
    render(d, d.ln || 'en');
  }catch(e){
    document.getElementById('root').innerHTML =
      `<div class="empty">Could not read certificate data.<br><span style="font-size:12px">Не вдалося прочитати дані сертифіката.</span></div>`;
  }
})();
</script>
</body>
</html>
